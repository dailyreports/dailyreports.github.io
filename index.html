<!DOCTYPE html>
<html>
<head>
    <title>Daily Report</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Daily Report</h1>
    <label for="childName">Child's Name:</label>
    <input type="text" id="childName" required>
    <br>
    <label for="skillsWorkedOn">Skills Worked On:</label>
    <input type="text" id="skillsWorkedOn" required>
    <br>
    <label for="skillsMastered">Skills Mastered:</label>
    <input type="text" id="skillsMastered" required>
    <br>
    <label for="skillsToPractice">Skills to Practice:</label>
    <input type="text" id="skillsToPractice" required>
    <br>
    <button onclick="generateReport()">Generate Report</button>

    <p id="reportOutput"></p>

    <button id="copyButton" style="display: none;">Copy Report</button>

    <script src="script.js"></script>
</body>
</html>
