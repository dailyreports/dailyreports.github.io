<!DOCTYPE html>
<html>
<head>
    <title>Daily Report</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Daily Report Generator</h1>
    <div class="credits-container">
    <div class="credits">Created by Ashley Feng</div>
    <div class="contact">Feedback: ashley.c.feng@gmail.com</div>
    </div>
    <label for="templateSelect">Choose a Template:</label>
    <select id="templateSelect">
        <option value="">Select a template</option>
        <option value="today">Daily Report from Today</option>
        <option value="yesterday">Daily Report from Yesterday</option>
    </select>

    <div id="inputFields" style="display: none;">
    <br>
    <label for="childName">Child's Name:</label>
    <input type="text" id="childName" required>
    <br>
    <label for="skillsWorkedOn">Skills Worked On:</label>
    <input type="text" id="skillsWorkedOn" required>
    <br>
    <label for="skillsMastered">Skills Mastered:</label>
    <input type="text" id="skillsMastered" required>
    <br>
    <label for="skillsToPractice">Skills to Practice:</label>
    <input type="text" id="skillsToPractice" required>
    <br>
    <button onclick="generateReport()">Generate Report</button>

    <p id="reportOutput"></p>

    <button id="copyButton" style="display: none;">Copy Report</button>
    </div>
  
    
    <script src="script.js"></script>
</body>
</html>
